name: Run Leumi Bot
on:
  schedule:
    # שני עד חמישי - מכוון ל-14:45 (12:45 UTC)
    - cron: '15 12 * * 1-4'
    
    # יום שישי - נשאר ב-12:00 (10:00 UTC)
    - cron: '0 10 * * 5'
  workflow_dispatch: # מאפשר הרצה ידנית

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10' # במקום 3.9

      - name: Install dependencies
        run: pip install yfinance pyTelegramBotAPI requests

      - name: Run bot
        # כאן אנחנו "מזריקים" את הסודות מהכספת לתוך הזיכרון של השרת
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GM_TOKEN: ${{ secrets.GM_TOKEN }}
        run: python "TEST BANKS.py"
